services:
  postgres:
    image: postgres:17
    container_name: loregraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loregraph
      POSTGRES_PASSWORD: loregraph
      POSTGRES_DB: loregraph
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loregraph -d loregraph"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:8
    container_name: loregraph-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8
    container_name: loregraph-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-init:
    image: redis:8
    container_name: loregraph-redis-init
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./redis/seed.sh:/seed.sh:ro
    entrypoint: ["/bin/sh", "/seed.sh"]
    restart: "no"

  neo4j:
    image: neo4j:2025.06.2
    container_name: loregraph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/change_me
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  neo4j-init:
    image: neo4j:2025.06.2
    container_name: loregraph-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_AUTH: neo4j/change_me
    volumes:
      - ./neo4j/schema.cypher:/seed/schema.cypher:ro
      - ./neo4j/seed.cypher:/seed/seed.cypher:ro
      - ./neo4j/relations.cypher:/seed/relations.cypher:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p change_me < /seed/schema.cypher
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p change_me < /seed/seed.cypher
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p change_me < /seed/relations.cypher
    restart: "no"

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
